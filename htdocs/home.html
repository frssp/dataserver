<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zotero Server</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f5f6fa; color: #333; min-height: 100vh; display: flex; flex-direction: column; }


/* ── Welcome body ─────────────────────────────────────────────────── */
.main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 20px; }
.welcome { text-align: center; max-width: 560px; }
.welcome h1 { font-size: 32px; font-weight: 300; color: #2b2b2b; margin-bottom: 12px; }
.welcome p { font-size: 16px; color: #666; line-height: 1.7; margin-bottom: 28px; }
.welcome .cta { display: inline-block; padding: 13px 30px; background: #c1302b; color: #fff; text-decoration: none; border-radius: 8px; font-size: 15px; font-weight: 500; box-shadow: 0 4px 14px rgba(193,48,43,.25); transition: transform .15s, box-shadow .15s; }
.welcome .cta:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(193,48,43,.34); }
.welcome .muted { display: block; margin-top: 18px; font-size: 13px; color: #aaa; }
.welcome .muted a { color: #777; text-decoration: none; }
.welcome .muted a:hover { color: #c1302b; }

.footer { background: #404040; color: #999; padding: 16px 0; text-align: center; font-size: 12px; }
</style>
</head>
<body>
<nav id="zotero-nav"></nav>

<div class="main">
    <div class="welcome">
        <h1>Welcome</h1>
        <p>Your self-hosted Zotero server.<br>Use the menu above to sign in, browse group libraries, or read the guide.</p>
        <a href="/library/" class="cta">Open Web Library</a>
        <span class="muted">New here? <a href="/register.php">Create an account</a> &middot; <a href="/manual.html">Read the guide</a></span>
    </div>
</div>
<div class="footer">Zotero Self-Hosted Server</div>
<script src="/nav.js"></script>
</body>
</html>
