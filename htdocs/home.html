<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zotero Server</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f5f6fa; color: #333; min-height: 100vh; display: flex; flex-direction: column; }

/* ── Unified Nav (zotero.org style) ──────────────────────────────── */
.site-nav { background: #fff; border-bottom: 1px solid #ddd; padding: 0 24px; display: flex; align-items: center; height: 56px; }
.site-nav .logo { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 300; letter-spacing: -0.5px; text-decoration: none; margin-right: 32px; }
.site-nav .logo .z { color: #c1302b; }
.site-nav .logo .rest { color: #333; }
.site-nav .nav-links { display: flex; align-items: center; gap: 0; flex: 1; }
.site-nav .nav-links a { display: flex; align-items: center; padding: 0 16px; height: 56px; color: #444; font-size: 14px; font-weight: 500; text-decoration: none; border-bottom: 3px solid transparent; transition: color .15s, border-color .15s; }
.site-nav .nav-links a:hover { color: #111; border-bottom-color: #c1302b; }

.main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.hero { text-align: center; max-width: 500px; }
.hero h1 { font-size: 28px; font-weight: 300; color: #333; margin-bottom: 8px; }
.hero p { font-size: 15px; color: #666; margin-bottom: 32px; line-height: 1.6; }

.links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.links a {
    display: block; padding: 16px 32px; border-radius: 8px; text-decoration: none;
    font-size: 15px; font-weight: 500; transition: all .15s;
}
.link-library { background: #c1302b; color: #fff; border: 1px solid #c1302b; }
.link-library:hover { background: #a52924; }
.link-account { background: #fff; color: #333; border: 1px solid #ddd; }
.link-account:hover { background: #f0f0f0; }
.link-admin { background: #fff; color: #333; border: 1px solid #ddd; }
.link-admin:hover { background: #f0f0f0; }

.footer { background: #404040; color: #999; padding: 16px 0; text-align: center; font-size: 12px; }
</style>
</head>
<body>
<nav class="site-nav">
    <a href="/" class="logo"><span class="z">z</span><span class="rest">otero</span></a>
    <div class="nav-links">
        <a href="/library/">Web Library</a>
        <a href="/account.php">Account</a>
        <a href="/admin.php">Admin</a>
    </div>
</nav>
<div class="main">
    <div class="hero">
        <h1>Self-Hosted Zotero Server</h1>
        <p>Your private research library sync server.<br>Manage your account, groups, and API keys.</p>
        <div class="links">
            <a href="/library/" class="links a link-library">Web Library</a>
            <a href="/account.php" class="links a link-account">My Account</a>
            <a href="/admin.php" class="links a link-admin">Admin Panel</a>
        </div>
    </div>
</div>
<div class="footer">Zotero Self-Hosted Server</div>
</body>
</html>
