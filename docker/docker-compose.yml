services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-zotero_root_pw}
    ports:
      # Bound to localhost: only for debugging from the docker host.
      # Containers reach mysql via the compose network instead.
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+00:00
      --sql-mode=STRICT_ALL_TABLES
      --event-scheduler=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  memcached:
    image: memcached:1.6-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:11211:11211"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  translation:
    image: zotero/translation-server:2.0.4
    restart: unless-stopped
    ports:
      - "1969:1969"

  php-fpm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.php
    restart: unless-stopped
    environment:
      - no_proxy=translation,mysql,memcached,redis,localhost,127.0.0.1
      - NO_PROXY=translation,mysql,memcached,redis,localhost,127.0.0.1
      # ─── Self-hosted server config (used by docker/entrypoint.sh) ───
      # Override these in docker/.env (gitignored). Defaults work for a
      # single-host local test but are NOT safe for any real deployment.
      # See docker/.env.example for details.
      - ZOTERO_BASE_URL=${ZOTERO_BASE_URL:-http://localhost:8080/}
      - ZOTERO_API_SUPER_USERNAME=${ZOTERO_API_SUPER_USERNAME:-admin}
      - ZOTERO_API_SUPER_PASSWORD=${ZOTERO_API_SUPER_PASSWORD:-admin}
      - ZOTERO_AUTH_SALT=${ZOTERO_AUTH_SALT:-zotero_self_hosted_salt}
      - ZOTERO_DB_PASSWORD=${ZOTERO_DB_PASSWORD:-zotero_app_pw}
    volumes:
      - ..:/var/www/dataserver
    depends_on:
      mysql:
        condition: service_healthy
      memcached:
        condition: service_started
      redis:
        condition: service_healthy
      translation:
        condition: service_started

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ..:/var/www/dataserver
    depends_on:
      - php-fpm

volumes:
  mysql_data:
