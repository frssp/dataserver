services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: zotero_root_pw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+00:00
      --sql-mode=STRICT_ALL_TABLES
      --event-scheduler=ON

  memcached:
    image: memcached:1.6-alpine
    ports:
      - "11211:11211"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  translation:
    image: zotero/translation-server:2.0.4
    restart: unless-stopped
    ports:
      - "1969:1969"

  php-fpm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.php
    environment:
      - no_proxy=translation,mysql,memcached,redis,localhost,127.0.0.1
      - NO_PROXY=translation,mysql,memcached,redis,localhost,127.0.0.1
      # ─── Self-hosted server config (used by docker/entrypoint.sh) ───
      # URL clients use to reach this server. The Zotero 7+ client opens this
      # URL in a browser during sign-in, so it MUST be reachable from client
      # machines (not 'localhost' unless every client runs on this host).
      - ZOTERO_BASE_URL=http://localhost:8080/
      # Super-user (HTTP Basic) credentials. CHANGE IN PRODUCTION.
      - ZOTERO_API_SUPER_USERNAME=admin
      - ZOTERO_API_SUPER_PASSWORD=admin
      # Random secret for hashing. CHANGE to a unique string (e.g. `openssl rand -hex 32`).
      - ZOTERO_AUTH_SALT=zotero_self_hosted_salt
    volumes:
      - ..:/var/www/dataserver
    depends_on:
      - mysql
      - memcached
      - redis
      - translation

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ..:/var/www/dataserver
    depends_on:
      - php-fpm

volumes:
  mysql_data:
