server {
    listen 80;
    server_name _;
    root /var/www/dataserver/htdocs;
    index index.php;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css text/xml application/json application/javascript application/atom+xml;
    gzip_min_length 1024;
    gzip_vary on;

    location = / {
        try_files /home.html =404;
    }

    # Redirect /library to /library/ so it hits the SPA location block
    location = /library {
        return 301 /library/;
    }

    # Zotero client browser-based login session flow (Zotero 7+)
    location = /login {
        rewrite ^ /login.php?$args last;
    }

    # SPA web library — serve static files, fallback to index.html for client-side routing
    location /library/ {
        try_files $uri /library/index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
