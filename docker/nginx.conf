server {
    listen 80;
    server_name _;
    root /var/www/dataserver/htdocs;
    index index.php;

    location = / {
        try_files /home.html =404;
    }

    # SPA web library — use exact match for index.html to break redirect cycle
    location = /library/index.html {
        alias /var/www/dataserver/htdocs/library/index.html;
    }
    location /library/ {
        alias /var/www/dataserver/htdocs/library/;
        try_files $uri /library/index.html;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
